<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60" role="img" aria-label="Adinkra pattern accent" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="adinkra" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Background -->
      <rect width="60" height="60" fill="#FAF3E0"/>
      <!-- Adinkra-inspired Gye Nyame symbol (simplified) -->
      <!-- Outer circle -->
      <circle cx="30" cy="30" r="22" fill="none" stroke="#C1440E" stroke-width="2"/>
      <!-- Inner circle -->
      <circle cx="30" cy="30" r="12" fill="none" stroke="#C1440E" stroke-width="2"/>
      <!-- Cross arms -->
      <line x1="30" y1="8" x2="30" y2="52" stroke="#C1440E" stroke-width="2"/>
      <line x1="8" y1="30" x2="52" y2="30" stroke="#C1440E" stroke-width="2"/>
      <!-- Diagonal accents -->
      <line x1="14" y1="14" x2="46" y2="46" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
      <line x1="46" y1="14" x2="14" y2="46" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
      <!-- Corner dots -->
      <circle cx="8" cy="8" r="3" fill="#2D6A4F"/>
      <circle cx="52" cy="8" r="3" fill="#2D6A4F"/>
      <circle cx="8" cy="52" r="3" fill="#2D6A4F"/>
      <circle cx="52" cy="52" r="3" fill="#2D6A4F"/>
    </pattern>
  </defs>
  <rect width="1200" height="60" fill="url(#adinkra)"/>
</svg>
